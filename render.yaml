services:
  - type: web
    name: budget-buddy
    env: docker
    buildCommand: |
      composer install --no-interaction --optimize-autoloader
      npm ci --production
      npm run build
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      # Add your other DB env vars here