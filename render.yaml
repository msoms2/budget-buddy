services:
  - type: web
    name: budget-buddy
    env: docker
    buildCommand: |
      composer install --no-interaction --no-dev --optimize-autoloader
      npm ci --production
      npm run build
    startCommand: |
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache  
      php artisan view:cache
      php artisan serve --host=0.0.0.0 --port=10000